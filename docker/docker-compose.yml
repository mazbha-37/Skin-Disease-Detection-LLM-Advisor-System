services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../checkpoints:/app/checkpoints
      - ../skin_advisor.db:/app/skin_advisor.db
    env_file: ../.env
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python ui/app.py
    ports:
      - "7860:7860"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
